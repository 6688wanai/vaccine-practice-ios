name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build TrollStore IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: vaccine-practice-source-for-github

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vaccine-practice-source-for-github/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build IPA
        run: |
          chmod +x scripts/build_ios_ipa.sh
          ./scripts/build_ios_ipa.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: vaccine-practice-ios-ipa
          path: vaccine-practice-source-for-github/build/ios/*.ipa
          if-no-files-found: error
